name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Tipo de build"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        if: inputs.build_type == 'debug'
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Restore keystore
        if: inputs.build_type == 'release'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_BASE64 nao configurado."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/ana-release.jks"

      - name: Build signed release APK
        if: inputs.build_type == 'release'
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/ana-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Verify signature
        if: inputs.build_type == 'release'
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BT/apksigner" verify --print-certs "$APK"

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/ana-release.jks"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ana-app-${{ inputs.build_type }}
          path: android/app/build/outputs/apk/${{ inputs.build_type }}/app-${{ inputs.build_type }}.apk
          if-no-files-found: error
