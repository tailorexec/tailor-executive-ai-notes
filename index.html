<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <script>
      // Aplica o tema salvo antes da 1a pintura (light e o padrao). Evita flash.
      try {
        var t = localStorage.getItem('tailor.theme')
        var dark = t === 'dark'
        document.documentElement.classList.toggle('dark', dark)
        var m = document.querySelector('meta[name="theme-color"]')
        if (m) m.setAttribute('content', dark ? '#010101' : '#FFFFFF')
      } catch (e) {}
      // App instalado na tela de inicio do iOS: o media query CSS `display-mode: standalone`
      // nao e confiavel nesse caminho (apple-mobile-web-app-capable e mais antigo que o
      // suporte a Web App Manifest). `navigator.standalone` e a API real e documentada da
      // Apple para essa deteccao -- usa uma classe no <html> para o CSS reduzir o respiro
      // do topo so quando o app roda instalado.
      try {
        if (window.navigator && window.navigator.standalone) {
          document.documentElement.classList.add('ios-standalone')
        }
      } catch (e) {}
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tailor Notes" />
    <meta name="description" content="Tailor Executive AI Notes - IA de anotacoes, transcricoes e analise de reunioes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Tailor Executive AI Notes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
