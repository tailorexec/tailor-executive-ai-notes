<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F5F4F2" />
    <script>
      // Aplica o tema salvo antes da 1a pintura (light e o padrao). Evita flash.
      try {
        var t = localStorage.getItem('tailor.theme')
        var dark = t === 'dark'
        document.documentElement.classList.toggle('dark', dark)
        var m = document.querySelector('meta[name="theme-color"]')
        if (m) m.setAttribute('content', dark ? '#010101' : '#F5F4F2')
      } catch (e) {}
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tailor Notes" />
    <meta name="description" content="Tailor Executive AI Notes - IA de anotacoes, transcricoes e analise de reunioes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
    <title>Tailor Executive AI Notes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
